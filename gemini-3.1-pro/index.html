<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Hat Hero</title>
<style>
  :root {
    --bg-color: #0a0a0a;
    --text-color: #f1f1f1;
  }
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a1a24 0%, #050505 100%);
    color: var(--text-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #hero-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    height: 60vh;
    min-height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    filter: drop-shadow(0 0 15px rgba(238, 0, 0, 0.2));
  }
  .caption {
    margin-top: 1rem;
    font-size: 1.25rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #dedede;
    text-transform: uppercase;
    z-index: 2;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    opacity: 0.8;
  }
  @media (prefers-reduced-motion: reduce) {
    .caption { transition: none; }
  }
</style>
</head>
<body>

<div id="hero-container">
  <canvas id="hatCanvas"></canvas>
</div>
<div class="caption">The Open Enterprise</div>

<script>
  const canvas = document.getElementById('hatCanvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  let width, height;

  const R_RED = [238, 0, 0];
  const R_DARK = [30, 30, 30];
  const GLOW = [255, 180, 50];

  let particles = [];
  const numParticles = 5000;
  
  // Motion query
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function initShape() {
    particles = [];
    for(let i = 0; i < numParticles; i++) {
      let r = Math.random();
      let bx, by, bz, col;

      if(r < 0.4) {
        // Brim
        let angle = Math.random() * Math.PI * 2;
        let rad = 1.0 + Math.sqrt(Math.random()) * 1.4; 
        bz = rad * Math.sin(angle) * 1.2; 
        bx = rad * Math.cos(angle) * 0.95;
        by = -0.15 * Math.cos(angle * 2) + (Math.random()-0.5) * 0.05; 
        col = R_RED;
      } else if(r < 0.85) {
        // Crown
        let angle = Math.random() * Math.PI * 2;
        let h = Math.random() * 1.4;
        let rad = 0.95 - h * 0.15;
        bz = rad * Math.sin(angle) * 1.1;
        bx = rad * Math.cos(angle) * 0.85;
        by = h;
        // Crease
        if(h > 1.1) {
          by -= 0.25 * Math.cos(angle * 2) * Math.sin(Math.PI * (h - 1.1) / 0.3);
        }
        col = R_RED;
      } else {
        // Ribbon
        let angle = Math.random() * Math.PI * 2;
        let h = Math.random() * 0.25;
        let rad = 0.98 - h * 0.15;
        bz = rad * Math.sin(angle) * 1.11;
        bx = rad * Math.cos(angle) * 0.86;
        by = h;
        col = R_DARK;
      }

      particles.push({
        bx, by, bz,
        cx: bx, cy: by, cz: bz,
        vx: 0, vy: 0, vz: 0,
        baseCol: col,
        col: [...col],
        orbiter: Math.random() < 0.03,
        wasDissolved: false,
        size: Math.random() * 1.5 + 0.5
      });
    }
  }

  function resize() {
    const parent = canvas.parentElement;
    width = parent.clientWidth;
    height = parent.clientHeight;
    // Scale for high DPI displays
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
  }

  window.addEventListener('resize', resize);

  let mode = 'normal'; // 'normal', 'dissolving', 'reforming'
  let spinAngle = 0;
  let animLock = false;

  const container = document.getElementById('hero-container');
  
  function triggerEffect() {
    if (prefersReducedMotion || animLock || mode !== 'normal') return;
    animLock = true;
    mode = 'dissolving';
    
    // Explode
    for(let p of particles) {
      p.vx = (Math.random() - 0.5) * 1.2;
      p.vy = (Math.random() - 0.5) * 1.2 + 1.5;
      p.vz = (Math.random() - 0.5) * 1.2;
      
      // Color to glow
      p.col[0] = GLOW[0]; p.col[1] = GLOW[1]; p.col[2] = GLOW[2];
      p.wasDissolved = true;
    }

    setTimeout(() => {
      mode = 'reforming';
      setTimeout(() => {
        mode = 'normal';
        animLock = false;
      }, 4000);
    }, 1500);
  }

  container.addEventListener('mouseenter', triggerEffect);
  container.addEventListener('touchstart', (e) => {
    triggerEffect();
  }, {passive: true});

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function loop() {
    requestAnimationFrame(loop);

    ctx.fillStyle = '#111116';
    ctx.fillRect(0, 0, width, height);

    // Subtle background gradient replacement since alpha:false ruins CSS background behind canvas
    const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width*0.6);
    grad.addColorStop(0, '#1a1a24');
    grad.addColorStop(1, '#050505');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    let baseSpinSpeed = prefersReducedMotion ? 0.002 : 0.008;
    spinAngle += mode === 'normal' ? baseSpinSpeed : baseSpinSpeed * 0.15;

    let cosA = Math.cos(spinAngle);
    let sinA = Math.sin(spinAngle);

    let scale = Math.min(width, height) * 0.22;
    let perspective = 800;
    
    // Tilt to look somewhat down at the hat
    let tiltX = 0.35;
    let cosT = Math.cos(tiltX);
    let sinT = Math.sin(tiltX);

    // Centering offset
    let cx = width / 2;
    let cy = height / 2 + scale * 0.5;
    let time = Date.now() * 0.001;

    for(let p of particles) {
      let tx = p.bx * cosA - p.bz * sinA;
      let ty = p.by;
      let tz = p.bz * cosA + p.bx * sinA;

      if (mode === 'normal' || mode === 'reforming') {
        if (p.orbiter && p.wasDissolved) {
          let orbitA = time * (p.bx > 0 ? 1.5 : -1.5) + p.by * 2;
          let or = 3.5 + Math.sin(time + p.by) * 0.5;
          tx = Math.cos(orbitA) * or;
          tz = Math.sin(orbitA) * or;
          ty = Math.sin(orbitA * 2.5) * 1.5 + 0.5;
          
          p.col[0] = lerp(p.col[0], GLOW[0], 0.05);
          p.col[1] = lerp(p.col[1], GLOW[1], 0.05);
          p.col[2] = lerp(p.col[2], GLOW[2], 0.05);
        } else {
          p.col[0] = lerp(p.col[0], p.baseCol[0], 0.02);
          p.col[1] = lerp(p.col[1], p.baseCol[1], 0.02);
          p.col[2] = lerp(p.col[2], p.baseCol[2], 0.02);
        }

        let spring = mode === 'reforming' ? 0.03 : 0.15;
        let friction = 0.88;

        p.vx += (tx - p.cx) * spring;
        p.vy += (ty - p.cy) * spring;
        p.vz += (tz - p.cz) * spring;

        p.vx *= friction;
        p.vy *= friction;
        p.vz *= friction;

      } else if (mode === 'dissolving') {
        p.vy += 0.015; // float up
        // swirl
        p.vx += Math.cos(p.cy * 5 + time) * 0.02;
        p.vz += Math.sin(p.cy * 5 + time) * 0.02;

        p.vx *= 0.98;
        p.vy *= 0.97;
        p.vz *= 0.98;
        
        p.col[0] = lerp(p.col[0], GLOW[0], 0.1);
        p.col[1] = lerp(p.col[1], 100, 0.1); 
        p.col[2] = lerp(p.col[2], 50, 0.1);
      }

      p.cx += p.vx;
      p.cy += p.vy;
      p.cz += p.vz;

      // Render projection
      let rx = p.cx;
      let ry = p.cy;
      let rz = p.cz;

      // Apply tilt scene
      let fy = ry * cosT - rz * sinT;
      let fz = rz * cosT + ry * sinT;
      let fx = rx;

      // Move into screen
      fz -= 3.0;

      if (fz < -perspective/scale) continue;

      let zFactor = perspective / (perspective + fz * scale);
      let px = cx + fx * scale * zFactor;
      let py = cy - fy * scale * zFactor;

      let size = p.size * zFactor;
      let alpha = Math.min(1, Math.max(0, zFactor * 1.2 - 0.2));

      if(size > 0.1 && px > 0 && px < width && py > 0 && py < height) {
        ctx.fillStyle = `rgba(${p.col[0]|0}, ${p.col[1]|0}, ${p.col[2]|0}, ${alpha})`;
        ctx.beginPath();
        ctx.arc(px, py, size, 0, Math.PI*2);
        ctx.fill();
        
        // Extra glow for orbiters/embers
        if (p.col[1] > 100) {
           ctx.shadowBlur = 10;
           ctx.shadowColor = `rgba(${p.col[0]|0}, ${p.col[1]|0}, ${p.col[2]|0}, 0.8)`;
           ctx.fill();
           ctx.shadowBlur = 0;
        }
      }
    }
  }

  initShape();
  resize();
  requestAnimationFrame(loop);

</script>
</body>
</html>
