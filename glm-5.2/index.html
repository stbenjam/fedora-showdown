<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fedora</title>
<style>
  :root{
    --bg0:#07070a;
    --bg1:#0d0b12;
    --fg:#e8e2ea;
    --muted:#8a8392;
    --accent:#e23b2e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg0)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--fg);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }
  .stage{
    position:fixed;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;
    background:
      radial-gradient(120% 90% at 50% 18%, #1a1320 0%, #0d0b12 38%, #060508 100%);
    overflow:hidden;
  }
  /* soft key light bloom */
  .stage::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(40% 30% at 50% 42%, rgba(226,59,46,0.16), rgba(226,59,46,0.05) 45%, transparent 70%);
    pointer-events:none;
  }
  /* vignette */
  .stage::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }
  canvas{
    position:absolute;inset:0;width:100%;height:100%;display:block;
    touch-action:none;
  }
  .caption{
    position:absolute;left:0;right:0;
    text-align:center;
    pointer-events:none;
    z-index:3;
  }
  .caption .kicker{
    font-size:11px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--muted);margin-bottom:10px;font-weight:500;
  }
  .caption .title{
    font-size:clamp(15px,2.4vw,19px);
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--fg);font-weight:600;
  }
  .caption .title b{color:var(--accent);font-weight:700}
  .hint{
    position:absolute;bottom:max(18px,env(safe-area-inset-bottom));
    left:0;right:0;text-align:center;
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--muted);opacity:.7;z-index:3;pointer-events:none;
  }
  @media (prefers-reduced-motion: reduce){
    .hint{display:none}
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <canvas id="c"></canvas>
    <div class="caption" id="caption">
      <div class="kicker">Open · Freedom · Fedora</div>
      <div class="title">Freedom. <b>Friends.</b> Features. First.</div>
    </div>
    <div class="hint" id="hint">hover · tap to dissolve</div>
  </div>

<script>
(function(){
  "use strict";
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const caption = document.getElementById('caption');
  const hintEl = document.getElementById('hint');

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W=0,H=0,DPR=1, scale=1, cx=0, cy=0, captionY=0;

  // ---------- glow sprites ----------
  function makeGlow(stops){
    const s=64; const c=document.createElement('canvas'); c.width=c.height=s;
    const g=c.getContext('2d');
    const grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    for(const [off,col] of stops) grd.addColorStop(off,col);
    g.fillStyle=grd; g.fillRect(0,0,s,s);
    return c;
  }
  const glowRed = makeGlow([
    [0,'rgba(255,210,190,1)'],
    [0.25,'rgba(230,70,55,0.9)'],
    [0.55,'rgba(150,18,18,0.35)'],
    [1,'rgba(0,0,0,0)']
  ]);
  const glowEmber = makeGlow([
    [0,'rgba(255,245,210,1)'],
    [0.25,'rgba(255,150,40,0.9)'],
    [0.55,'rgba(220,70,10,0.3)'],
    [1,'rgba(0,0,0,0)']
  ]);
  const glowWhite = makeGlow([
    [0,'rgba(255,255,255,1)'],
    [0.3,'rgba(255,235,220,0.7)'],
    [1,'rgba(0,0,0,0)']
  ]);

  // ---------- hat geometry (local space, y up) ----------
  function genHat(){
    const pts=[];
    const nA=150;
    // brim
    const rin=0.58, rout=1.52;
    for(let i=0;i<nA;i++){
      const a=(i/nA)*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
      for(let j=0;j<16;j++){
        const f=j/15, r=rin+(rout-rin)*f;
        // gentle dish + outer curl
        let y=-0.06*Math.sin(f*Math.PI)+0.14*f*f;
        pts.push({x:ca*r,y:y,z:sa*r,k:'brim',f:f});
        if(j===15) pts.push({x:ca*r,y:y-0.05,z:sa*r,k:'brim',f:f});
      }
    }
    // crown side
    const ch=1.06, rBot=0.6, rTop=0.5;
    for(let i=0;i<nA;i++){
      const a=(i/nA)*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
      for(let j=0;j<11;j++){
        const yy=(j/10)*ch, r=rBot+(rTop-rBot)*(yy/ch);
        pts.push({x:ca*r,y:yy,z:sa*r,k:'crown'});
      }
    }
    // hatband
    for(let i=0;i<nA;i++){
      const a=(i/nA)*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
      const r=rBot+0.002;
      pts.push({x:ca*r,y:0.075,z:sa*r,k:'band'});
      pts.push({x:ca*r,y:0.02,z:sa*r,k:'band'});
    }
    // crown top with central pinch + front crease
    const topR=0.5, topY=ch;
    for(let i=0;i<nA;i++){
      const a=(i/nA)*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
      for(let j=0;j<9;j++){
        const r=topR*(j/8);
        const dep=0.17*Math.exp(-(r*r)/0.055);
        // crease along x (front-back) -> dip more near x=0
        const crease=0.05*Math.exp(-(ca*ca)*3)*Math.exp(-(r*r)/0.2);
        pts.push({x:ca*r,y:topY-dep-crease+0.0,z:sa*r,k:'top'});
      }
    }
    return pts;
  }

  let home = genHat();

  // per-particle state
  const P = home.map(h=>({
    hx:h.x,hy:h.y,hz:h.z, k:h.k,
    x:h.x,y:h.y,z:h.z,
    vx:0,vy:0,vz:0,
    // dissolve direction
    dx:0,dy:0,dz:0,
    // orbital linger params (assigned to subset)
    orb:false, orbR:0, orbA:0, orbSpd:0, orbY:0, trail:[]
  }));

  // pick linger orbiters
  function chooseOrbiters(){
    const n=Math.max(18, Math.min(34, Math.round(P.length*0.006)));
    const idxs=new Set();
    while(idxs.size<n) idxs.add((Math.random()*P.length)|0);
    for(let i=0;i<P.length;i++){
      if(idxs.has(i)){
        P[i].orb=true;
        P[i].orbR=1.7+Math.random()*1.0;
        P[i].orbA=Math.random()*Math.PI*2;
        P[i].orbSpd=(0.25+Math.random()*0.5)*(Math.random()<0.5?1:-1);
        P[i].orbY=(Math.random()*2-1)*0.9;
        P[i].trail.length=0;
      } else {
        P[i].orb=false;
        P[i].trail.length=0;
      }
    }
  }

  // ---------- transform ----------
  const TILT = -0.26; // tip forward to reveal crown
  let spin = 0;          // current y rotation
  let spinTarget = 0;    // for easing
  let spinVel = 0.34;    // rad/s idle

  function transform(x,y,z,a){
    // Rx(tilt)
    const ct=Math.cos(TILT), st=Math.sin(TILT);
    let y1=y*ct - z*st;
    let z1=y*st + z*ct;
    let x1=x;
    // Ry(a)
    const ca=Math.cos(a), sa=Math.sin(a);
    const x2=x1*ca + z1*sa;
    const z2=-x1*sa + z1*ca;
    return [x2,y1,z2];
  }

  const FOV=4.2;
  function project(x,y,z){
    const s=FOV/(FOV+z);
    return [cx + x*s*scale, cy - y*s*scale, s, z];
  }

  // ---------- colors ----------
  function baseColor(k){
    switch(k){
      case 'band': return [70,12,12];
      case 'top':  return [232,64,48];
      case 'brim': return [206,40,32];
      case 'crown':return [216,44,34];
      default: return [200,40,30];
    }
  }

  // ---------- animation state machine ----------
  // phases: 'idle' -> 'dissolve' -> 'swirl' -> 'reform' -> 'idle' (with orbiters)
  let phase='idle';
  let phaseT=0; // seconds elapsed in phase
  let active=false;
  const T_DISSOLVE=1.5, T_SWIRL=1.3, T_REFORM=1.5;
  let dissolveBuilt=false;

  function activate(){
    if(reduceMotion) return;
    if(phase!=='idle') return;
    active=true;
    phase='dissolve'; phaseT=0;
    spinVel=0.34;
    dissolveBuilt=false;
    if(hintEl) hintEl.style.opacity='0';
  }

  function buildDissolve(){
    for(const p of P){
      // outward direction from hat axis, biased upward
      const rx=p.hx, rz=p.hz;
      const len=Math.hypot(rx,rz)||1;
      const ux=rx/len, uz=rz/len;
      const up=0.6+Math.random()*0.9;
      const spread=0.9+Math.random()*0.7;
      p.dx=ux*spread + (Math.random()-0.5)*0.5;
      p.dy=up + (Math.random()-0.5)*0.4 + p.hy*0.4;
      p.dz=uz*spread + (Math.random()-0.5)*0.5;
      // tangential swirl (around y): perpendicular to radial
      p.sx=-uz; p.sz=ux;
      p.spd=0.8+Math.random()*1.4;
      p.pspeed=1.1+Math.random()*1.4;
      // start from current (home) position
      p.x=p.hx; p.y=p.hy; p.z=p.hz;
      p.vx=p.dx*p.pspeed; p.vy=p.dy*p.pspeed; p.vz=p.dz*p.pspeed;
    }
    dissolveBuilt=true;
  }

  // ---------- input ----------
  function onEnter(){ activate(); }
  stage.addEventListener('pointerenter', onEnter);
  stage.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    activate();
  });
  // keyboard accessibility
  stage.tabIndex=0;
  stage.addEventListener('keydown',(e)=>{
    if(e.key===' '||e.key==='Enter'){ e.preventDefault(); activate(); }
  });

  // ---------- resize ----------
  function resize(){
    DPR=Math.min(2, window.devicePixelRatio||1);
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=Math.floor(W*DPR);
    canvas.height=Math.floor(H*DPR);
    canvas.style.width=W+'px';
    canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;
    cy=H*0.5 - Math.min(H*0.04, 30);
    scale=Math.min(W,H)*0.21;
    // caption placement under the hat
    const hatBottomScreen = cy + (1.1)*scale* (FOV/(FOV+0)) ; // approx
    captionY = cy + scale*1.35;
    caption.style.top = captionY+'px';
  }
  window.addEventListener('resize', resize);

  // ---------- main loop ----------
  let last=performance.now()/1000;
  function frame(now){
    const t=now/1000;
    let dt=t-last; last=t;
    if(dt>0.05) dt=0.05;

    // spin
    if(reduceMotion){
      spin = 0; // static
    } else {
      if(phase==='idle'){
        spin += spinVel*dt;
      } else if(phase==='dissolve'){
        // ease spin toward nearest 0
        spin += spinVel*dt*(1-Math.min(1,phaseT/T_DISSOLVE));
      } else {
        // keep slowly rotating during swirl/reform, then resume
        spin += spinVel*0.15*dt;
      }
    }

    // phase updates
    if(phase==='dissolve'){
      if(!dissolveBuilt) buildDissolve();
      phaseT+=dt;
      const u=Math.min(1,phaseT/T_DISSOLVE);
      for(const p of P){
        // integrate with damping + swirl force
        p.vx += p.sx*p.spd*0.9*dt;
        p.vz += p.sz*p.spd*0.9*dt;
        p.vy -= 0.35*dt; // gentle gravity-ish settle
        p.vx *= (1-1.1*dt);
        p.vy *= (1-0.8*dt);
        p.vz *= (1-1.1*dt);
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.z += p.vz*dt;
      }
      if(u>=1){ phase='swirl'; phaseT=0; }
    } else if(phase==='swirl'){
      phaseT+=dt;
      const u=Math.min(1,phaseT/T_SWIRL);
      for(const p of P){
        // slow swirl: add tangential drift around y axis
        const rx=p.x, rz=p.z;
        const len=Math.hypot(rx,rz)||1;
        const tx=-rz/len, tz=rx/len;
        p.vx += tx*0.5*dt;
        p.vz += tz*0.5*dt;
        p.vx *= (1-0.6*dt);
        p.vy *= (1-0.5*dt);
        p.vz *= (1-0.6*dt);
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.z += p.vz*dt;
      }
      if(u>=1){ phase='reform'; phaseT=0; chooseOrbiters(); }
    } else if(phase==='reform'){
      phaseT+=dt;
      const u=Math.min(1,phaseT/T_REFORM);
      const e=1-Math.pow(1-u,3); // easeOutCubic
      for(const p of P){
        // ease back toward home; orbiters drift to their orbit positions
        if(p.orb){
          const tx=Math.cos(p.orbA)*p.orbR;
          const tz=Math.sin(p.orbA)*p.orbR;
          p.x += (tx-p.x)*Math.min(1,dt*4);
          p.y += (p.orbY-p.y)*Math.min(1,dt*4);
          p.z += (tz-p.z)*Math.min(1,dt*4);
        } else {
          p.x += (p.hx-p.x)*Math.min(1,dt*3*(0.5+e));
          p.y += (p.hy-p.y)*Math.min(1,dt*3*(0.5+e));
          p.z += (p.hz-p.z)*Math.min(1,dt*3*(0.5+e));
        }
      }
      if(u>=1){
        // snap home
        for(const p of P){
          if(!p.orb){ p.x=p.hx; p.y=p.hy; p.z=p.hz; }
        }
        phase='idle'; phaseT=0;
        active=false;
        if(hintEl) hintEl.style.opacity='';
      }
    } else {
      // idle: orbiters keep moving; others at home
      for(const p of P){
        if(p.orb){
          p.orbA += p.orbSpd*dt;
          p.x=Math.cos(p.orbA)*p.orbR;
          p.z=Math.sin(p.orbA)*p.orbR;
          p.y=p.orbY + Math.sin(p.orbA*1.7)*0.12;
        } else {
          p.x=p.hx; p.y=p.hy; p.z=p.hz;
        }
      }
    }

    render();
    requestAnimationFrame(frame);
  }

  // ---------- render ----------
  function render(){
    // background clear (opaque to reset)
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
    ctx.clearRect(0,0,W,H);

    // soft floor shadow
    drawShadow();

    // particles
    ctx.globalCompositeOperation='lighter';

    const tiltCos=Math.cos(TILT);
    // precompute transform per particle and gather
    // for additive glow we don't need sorting
    for(let i=0;i<P.length;i++){
      const p=P[i];
      const [x,y,z]=transform(p.x,p.y,p.z,spin);
      const [sx,sy,s,depth]=project(x,y,z);
      if(s<=0) continue;

      // depth-based brightness: front brighter
      // z ranges roughly [-1.6,1.6]
      const db = 0.55 + 0.45*((1.6 - depth)/3.2);
      let b = db;
      // kind brightness
      let col;
      if(p.orb){
        col = glowWhite;
        b *= 0.9+0.3*Math.sin(performance.now()*0.004+i);
      } else if(phase==='dissolve'||phase==='swirl'){
        // embers: warmer as they fly apart
        col = glowEmber;
        b *= 1.0;
      } else {
        col = (p.k==='band')?glowRed:glowRed;
        if(p.k==='band') b*=0.5;
        if(p.k==='top') b*=1.05;
      }

      const size = (p.orb? 2.2 : 1.7) * s * (p.k==='band'?0.9:1.0);
      const r = size * 2.4;
      ctx.globalAlpha = Math.max(0,Math.min(1,b));
      ctx.drawImage(col, sx-r, sy-r, r*2, r*2);

      // orbiter trails
      if(p.orb){
        p.trail.push([sx,sy]);
        if(p.trail.length>14) p.trail.shift();
        ctx.globalAlpha=0.5;
        for(let k=0;k<p.trail.length;k++){
          const tp=p.trail[k];
          const tr = size*1.1*((k+1)/p.trail.length);
          ctx.drawImage(glowWhite, tp[0]-tr, tp[1]-tr, tr*2, tr*2);
        }
        ctx.globalAlpha=1;
      }
    }
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
  }

  function drawShadow(){
    // elliptical soft shadow on an implied floor just below brim
    const [x,y,z]=transform(0,0,0,spin);
    const [sx,sy,s,depth]=project(x,-0.02,z);
    const w = scale*1.7*s;
    const h = scale*0.34*s;
    ctx.save();
    ctx.globalCompositeOperation='source-over';
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,w);
    g.addColorStop(0,'rgba(0,0,0,0.55)');
    g.addColorStop(0.5,'rgba(0,0,0,0.28)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.translate(sx,sy);
    ctx.scale(1, h/w);
    ctx.beginPath();
    ctx.arc(0,0,w,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ---------- init ----------
  resize();
  if(reduceMotion){
    // static scene, no orbiters, gentle nothing
    spin=0;
    for(const p of P){ p.x=p.hx; p.y=p.hy; p.z=p.hz; p.orb=false; }
    hintEl.style.display='none';
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
